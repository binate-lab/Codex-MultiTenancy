<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trajan</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="TrajanEcoleApp.styles.css" rel="stylesheet" />
    <style>
        /* Barre de filtres /scolarites : tous les champs (.acc-ffield) — Nom, Prénoms,
           Matricule, Niveau, Classe, Statut, Inscrit. La page (.acc-window) force TOUS ses
           champs à 22px (look Access) ; pour n'agir QUE sur les filtres on préfixe par
           .acc-window (spécificité supérieure). Règle GLOBALE (hors CSS scopé, sans ::deep)
           car le bundle scopé n'atteint pas l'input interne de MudBlazor. Texte 18px,
           champ aplati à 30px. */
        .acc-window .acc-ffield input,
        .acc-window .acc-ffield .mud-input-slot,
        .acc-window .acc-ffield .mud-select-input {
            font-size: 18px !important;
            line-height: 1.1 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        .acc-window .acc-ffield input {
            height: 30px !important;
        }
        /* (Les filtres de Versements /scolarites suivent désormais le MÊME gabarit que
           /listes-classe — voir le bloc « gabarit COMMUN » plus bas, partagé via
           .lc-filtres/.sc-filtres.) */
        .acc-window .acc-ffield .mud-input-slot,
        .acc-window .acc-ffield .mud-input.mud-input-outlined,
        .acc-window .acc-ffield .mud-input-control-input-container {
            min-height: 30px !important;
        }

        /* ===== Gabarit COMMUN des barres de filtres /listes-classe (.lc-filtres) ET
           /scolarites (.sc-filtres) — MÊME aspect sur les deux pages. Scopé aux marqueurs de
           page → n'affecte aucune autre page .acc-window (qui partagent .acc-ffield). ===== */

        /* Champs texte (.acc-ffield : Nom, Prénoms, Matricule, N° Inscr) : police 16px + padding
           vertical symétrique qui définit la hauteur ET centre le texte (la base .acc-ffield
           force padding 0 → sinon texte collé en haut). */
        .acc-window .lc-filtres .acc-ffield input,
        .acc-window .lc-filtres .acc-ffield .mud-input-slot,
        .acc-window .lc-filtres .acc-ffield .mud-select-input,
        .acc-window .sc-filtres .acc-ffield input,
        .acc-window .sc-filtres .acc-ffield .mud-input-slot,
        .acc-window .sc-filtres .acc-ffield .mud-select-input {
            font-size: 16px !important;
            height: auto !important;
            padding-top: 4px !important;
            padding-bottom: 2px !important;
        }
        .acc-window .lc-filtres .acc-ffield .mud-input.mud-input-outlined,
        .acc-window .lc-filtres .acc-ffield .mud-input-control-input-container,
        .acc-window .sc-filtres .acc-ffield .mud-input.mud-input-outlined,
        .acc-window .sc-filtres .acc-ffield .mud-input-control-input-container {
            min-height: 22px !important;
        }

        /* Largeurs des champs texte : Matricule 170, N° Inscr 120, Nom & Prénoms 170. */
        .acc-window .lc-filtres .lc-matricule,
        .acc-window .sc-filtres .lc-matricule {
            width: 170px !important;
            min-width: 170px !important;
            max-width: 170px !important;
        }
        .acc-window .lc-filtres .lc-numordre,
        .acc-window .sc-filtres .lc-numordre {
            width: 120px !important;
            min-width: 120px !important;
            max-width: 120px !important;
        }
        .acc-window .lc-filtres .lc-nom,
        .acc-window .lc-filtres .lc-prenoms,
        .acc-window .sc-filtres .lc-nom,
        .acc-window .sc-filtres .lc-prenoms {
            width: 170px !important;
            min-width: 170px !important;
            max-width: 170px !important;
        }

        /* Déroulantes passées en .lc-bulk-op = hauteur par défaut MudBlazor (gabarit « Action
           en masse ») ; largeur 110px par défaut + police 16px via .lc-fstd. .lc-bulk-op est
           scopé à la barre → ne touche PAS le vrai « Action en masse » (185px, hors barre). */
        .acc-window .lc-filtres .lc-bulk-op,
        .acc-window .sc-filtres .lc-bulk-op {
            width: 110px !important;
            min-width: 110px !important;
            max-width: 110px !important;
        }
        .acc-window .lc-filtres .lc-fstd input,
        .acc-window .lc-filtres .lc-fstd .mud-select-input,
        .acc-window .sc-filtres .lc-fstd input,
        .acc-window .sc-filtres .lc-fstd .mud-select-input {
            font-size: 16px !important;
        }
        .acc-window .lc-filtres .lc-fstd,
        .acc-window .sc-filtres .lc-fstd {
            width: 110px !important;
            min-width: 110px !important;
            max-width: 110px !important;
        }
        /* Niveau 130 / Classe 135 : spécificité 0,4,0 pour battre le 110px ci-dessus. */
        .acc-window .lc-filtres .lc-fstd.lc-fniveau,
        .acc-window .sc-filtres .lc-fstd.lc-fniveau {
            width: 130px !important;
            min-width: 130px !important;
            max-width: 130px !important;
        }
        .acc-window .lc-filtres .lc-fstd.lc-fclasse,
        .acc-window .sc-filtres .lc-fstd.lc-fclasse {
            width: 135px !important;
            min-width: 135px !important;
            max-width: 135px !important;
        }

        /* Filtre Nom affiché en MAJUSCULES (la valeur reste inchangée, la recherche est
           déjà insensible à la casse). */
        .acc-window .acc-fmaj input {
            text-transform: uppercase !important;
        }

        /* Largeurs des filtres (globales : les règles de largeur scopées n'atteignent pas
           la racine MudBlazor). Défaut compact pour tenir sur une seule ligne ; les largeurs
           spécifiques ci-dessous l'emportent (même spécificité, définies après). */
        .acc-window .acc-ffield {
            width: 130px !important;
            min-width: 130px !important;
            max-width: 130px !important;
        }
        .acc-window .acc-fmatricule {
            width: 170px !important;
            min-width: 170px !important;
            max-width: 170px !important;
        }
        .acc-window .acc-fnumordre {
            width: 120px !important;
            min-width: 120px !important;
            max-width: 120px !important;
        }
        /* Filtres déroulants courts (Statut, Inscrit, Actif, Transport) : largeur 110px.
           Définis APRÈS .acc-ffield pour l'emporter (même spécificité). */
        .acc-window .acc-fnarrow {
            width: 110px !important;
            min-width: 110px !important;
            max-width: 110px !important;
        }
        /* Niveau, Classe, CodeParent : un peu plus larges (135px). Définis APRÈS .acc-fnarrow
           pour l'emporter sur Niveau/Classe (qui ont aussi .acc-fnarrow). */
        .acc-window .acc-fniveau,
        .acc-window .acc-fclasse,
        .acc-window .acc-fcodeparent {
            width: 135px !important;
            min-width: 135px !important;
            max-width: 135px !important;
        }

        /* Sélecteurs de dates de l'aperçu « Versements entre deux dates » (barre d'outils) :
           compacts, texte normal (sinon happés par le 22px « Access » global). */
        .acc-window .journee-datepick {
            width: 130px !important;
            min-width: 130px !important;
        }
        .acc-window .journee-datepick input,
        .acc-window .journee-datepick .mud-input-slot {
            font-size: 14px !important;
        }

        /* Pager de la grille élèves : le sélecteur « rows per page » (5) était aussi happé
           par les 22px du look Access. On le ramène à la taille du texte « 1-5 of 34 » (14px). */
        .acc-window .mud-table-pagination input,
        .acc-window .mud-table-pagination .mud-input-slot,
        .acc-window .mud-table-pagination .mud-select-input {
            font-size: 14px !important;
        }

        /* Hauteur du bloc pager réduite (52px -> 40px). */
        .acc-window .mud-table-pagination,
        .acc-window .mud-table-pagination .mud-toolbar {
            min-height: 40px !important;
            height: 40px !important;
        }

        /* Lignes élèves cliquables (clic = sélection/fiche) : curseur « doigt » au survol.
           Couvre les DEUX grilles élèves (/scolarites et /listes-classe) via .acc-grid-eleves.
           Les champs édités en cellule gardent leur curseur natif (texte) par-dessus. */
        .acc-window .acc-grid-eleves tbody tr {
            cursor: pointer;
        }

        /* Grille liste élèves : lignes à 26px (alignées sur la grille Modalités de versement).
           Les champs des cellules (happés par les 22px « Access ») sont compactés pour tenir. */
        .acc-window .acc-grid-eleves td {
            height: 26px !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        /* Resserrement horizontal (défaut MudBlazor = 16px gauche / 24px droite) —
           appliqué aux cellules ET aux en-têtes pour garder les colonnes alignées. */
        .acc-window .acc-grid-eleves td,
        .acc-window .acc-grid-eleves th {
            padding-left: 10px !important;
            padding-right: 10px !important;
        }
        /* Colonnes LV2 / Arts : padding horizontal réduit à 1px pour élargir la zone utile de
           la déroulante. Cible data-col => n'affecte que ces cellules (les en-têtes gardent 10px). */
        .acc-window .acc-grid-eleves td[data-col="LV_2"],
        .acc-window .acc-grid-eleves td[data-col="Arts"],
        .acc-window .acc-grid-eleves td[data-col="Red"] {
            padding-left: 1px !important;
            padding-right: 1px !important;
        }
        /* Panneau « Action en masse » (bas de grille Liste de classe) : champs à taille normale
           (sinon happés à 22px par la règle .acc-window) + largeurs fixes. */
        .acc-window .lc-bulk-op { width: 185px !important; min-width: 185px !important; max-width: 185px !important; }
        .acc-window .lc-bulk-val { width: 145px !important; min-width: 145px !important; max-width: 145px !important; }
        .acc-window .lc-bulk-op input,
        .acc-window .lc-bulk-op .mud-select-input,
        .acc-window .lc-bulk-val input,
        .acc-window .lc-bulk-val .mud-select-input {
            font-size: 14px !important;
        }
        /* Jauge du panneau : en GLOBAL (le CSS scopé n'atteint pas la racine du MudProgressLinear).
           flex-basis:100% => la barre passe sur une ligne complète, sous les contrôles. */
        .lc-bulk-progress { flex-basis: 100% !important; width: 100% !important; margin-top: 2px; }
        .acc-window .acc-grid-eleves td input,
        .acc-window .acc-grid-eleves td .mud-input-slot,
        .acc-window .acc-grid-eleves td .mud-select-input {
            font-size: 14px !important;
            min-height: 20px !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        .acc-window .acc-grid-eleves td .mud-input-control,
        .acc-window .acc-grid-eleves td .mud-input {
            min-height: 20px !important;
        }
        /* AppBar de l'espace école (.school-shell) : barre FLOTTANTE arrondie.
           Hauteur = nombre d'or (phi ≈ 1.618) × 3 × 32px ≈ 155.33px.
           Marge 12px tout autour + 12px de jeu sous la barre => le tiroir et le
           contenu démarrent à 12 + 155.33 + 12 = 179.33px (via --mud-appbar-height,
           ce qui décale aussi le tiroir : logo + menu ne sont plus recouverts).
           Le MainLayout (TrajanTenancy) garde la hauteur par défaut. */
        .school-shell {
            --mud-appbar-height: 179.33px;
            --mud-appbar-min-height: 155.33px;
        }

        .school-shell .mud-appbar {
            top: 12px;
            left: 12px;
            right: 12px;
            width: auto;
            border-radius: 18px;
            background-image: url('/images/appbar.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .school-shell .mud-appbar .mud-toolbar {
            min-height: 155.33px;
            height: 155.33px;
        }

        .school-shell .mud-main-content {
            padding-top: 179.33px !important;
        }

        /* Menu latéral (tiroir) : image de fond menu.png. */
        .school-shell .mud-drawer {
            background-image: url('/images/menu.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .school-shell .mud-drawer .mud-typography,
        .school-shell .mud-drawer .mud-nav-link {
            color: #ffffff !important;
        }

        .school-shell .mud-drawer .mud-nav-link.mud-nav-link-disabled {
            color: rgba(255, 255, 255, 0.65) !important;
        }

        .school-shell .mud-drawer .mud-nav-link .mud-icon-root {
            color: inherit !important;
        }

        .school-shell .mud-drawer .mud-divider {
            border-color: rgba(255, 255, 255, 0.3) !important;
            margin: 0 !important;
            /* CAUSE RACINE du « menu têtu » : dans le tiroir (flex column) le <hr>
               MudDivider a flex-grow:1 et ABSORBE tout l'espace vertical libre — espace
               qui variait avec la hauteur de l'en-tête (chargement async logo/nom/année),
               d'où un menu qui « redescendait ». On fige le séparateur à 1px. */
            flex: 0 0 auto !important;
            height: 1px !important;
        }

        /* Menu resserré juste sous « Tâches courantes » : on neutralise marge et
           padding haut sur toutes les variantes possibles du conteneur de menu
           (nav / ul / liste) et sur la première entrée. */
        .school-shell .mud-drawer .mud-navmenu,
        .school-shell .mud-drawer nav,
        .school-shell .mud-drawer .mud-navmenu ul,
        .school-shell .mud-drawer .mud-navmenu .mud-list,
        .school-shell .mud-drawer .mud-navmenu .mud-list-padding {
            padding-top: 0 !important;
        }

        /* Position du menu : on laisse ~1 cm d'air entre le séparateur (« Tâches
           courantes ») et la première entrée. On utilise transform (et pas margin)
           car la mise en page flex du tiroir ignore margin-top. Ajustable. */
        .school-shell .mud-drawer .mud-navmenu {
            transform: translateY(4px) !important;
        }

        .school-shell .mud-drawer .mud-navmenu > :first-child,
        .school-shell .mud-drawer .mud-navmenu ul > :first-child,
        .school-shell .mud-drawer .mud-navmenu .mud-list > :first-child {
            margin-top: 0 !important;
            padding-top: 0 !important;
        }

        .school-shell .mud-drawer .mud-nav-link {
            min-height: 38px;
            pointer-events: auto;
            border-radius: 6px;
            transition: background-color .2s ease, transform .15s ease, box-shadow .15s ease;
        }

        /* Survol de TOUTES les entrées du menu : fond renforcé, texte demi-gras
           et légère ÉLÉVATION (l'entrée se soulève). */
        .school-shell .mud-drawer .mud-nav-link:hover {
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
        }

        /* Champ « Matricule National » (formulaire Création élève) : fond jaune façon
           Access. Règle globale car la classe .acc-yellow est posée sur un composant
           MudBlazor dont la racine ne reçoit pas l'attribut de scope ; un ::deep
           scopé ne l'atteindrait pas. */
        .acc-yellow .mud-input-slot,
        .acc-yellow input {
            background-color: #fff79a !important;
        }

        /* Zones de saisie du formulaire Création élève : +2px sur la taille EFFECTIVE
           (~1rem par défaut MudBlazor, pas 0.78rem qui n'était jamais appliqué). Labels
           (.acc-label) inchangés. Règle globale car un ::deep scopé n'atteint pas MudBlazor. */
        .acc-window .mud-input-slot,
        .acc-window .mud-select-input,
        .acc-window input,
        .acc-window textarea {
            font-size: 22px !important;
        }

        /* Matricule National : plus grand que les autres champs, gras, bordeaux (#6D071A).
           L'affichage groupé (« 25 789 312 Z ») est fait côté C# à la sortie du champ. */
        .acc-window .acc-matricule input {
            font-size: 26px !important;
            font-weight: 700 !important;
            color: #6D071A !important;
            letter-spacing: 1px;
        }

        /* Champs Tuteur éditables de la Fiche Élève (Liste de classe) : compacts, occupent la
           largeur restante de la ligne libellé/champ. Règle GLOBALE (les champs MudBlazor ne se
           laissent pas piloter par le CSS scopé). */
        .lc-tuteur-input {
            flex: 1 1 auto;
            min-width: 0;
        }
        .lc-tuteur-input input,
        .lc-tuteur-input .mud-input-slot {
            font-size: 0.82rem !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            min-height: 22px !important;
        }

        /* Impression de la Fiche Élève seule : on masque tout le reste et on épingle la fiche
           en haut à gauche. Activé par la classe body « lc-print-fiche » (posée le temps du print). */
        @media print {
            body.lc-print-fiche * {
                visibility: hidden !important;
            }
            body.lc-print-fiche .lc-fiche,
            body.lc-print-fiche .lc-fiche * {
                visibility: visible !important;
            }
            body.lc-print-fiche .lc-fiche {
                position: absolute;
                left: 0;
                top: 0;
                width: 520px;
                box-shadow: none;
            }

            /* Impression de la Liste de classe : on masque tout sauf la feuille d'aperçu A4.
               Activé par la classe body « lc-print-liste » (posée le temps du print). */
            body.lc-print-liste * {
                visibility: hidden !important;
            }
            body.lc-print-liste .lc-feuille,
            body.lc-print-liste .lc-feuille * {
                visibility: visible !important;
            }
            body.lc-print-liste .lc-feuille {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                min-height: 0;
                box-shadow: none;
            }

            /* Impression du Reçu de paiement : on masque tout sauf la feuille du reçu (classe
               body « svt-print-recu », posée le temps du print). */
            body.svt-print-recu * {
                visibility: hidden !important;
            }
            body.svt-print-recu .recu-feuille,
            body.svt-print-recu .recu-feuille * {
                visibility: visible !important;
            }
            body.svt-print-recu .recu-feuille {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                min-height: 0;
                box-shadow: none;
            }

            /* Impression de l'état des versements du jour : on masque tout sauf « .journee-feuille »
               (classe body « svt-print-journee », posée le temps du print). */
            body.svt-print-journee * {
                visibility: hidden !important;
            }
            body.svt-print-journee .journee-feuille,
            body.svt-print-journee .journee-feuille * {
                visibility: visible !important;
            }
            body.svt-print-journee .journee-feuille {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                min-height: 0;
                box-shadow: none;
            }
        }
    </style>

<body>
    <div id="app">
        <style>
            /* ===== HIGH-CONTRAST, LIGHT-GREEN STRIPES ===== */

            @keyframes panStripes {
                0% {
                    background-position: 0 0;
                }

                100% {
                    background-position: 400px 0;
                }
            }

            /* base layer shared by all striped divs */
            .abc-mud-wasm {
                position: fixed;
                inset: 0; /* full-screen */
                z-index: -1;
                background-size: 400px 400px; /* stripe width */
                background-repeat: repeat;
                animation: panStripes 8s linear infinite;
                opacity: .9; /* master brightness (layer 1) */
            }

                /* ---------- individual layers ---------- */

                /* layer 1 – mint ↔ medium green */
                .abc-mud-wasm:nth-of-type(1) {
                    background-image: repeating-linear-gradient( -45deg, #C8E6C9 0 60px, /* mint */
                    #81C784 60px 120px /* medium green */
                    );
                }

                /* layer 2 – medium ↔ deep green, reverse direction */
                .abc-mud-wasm:nth-of-type(2) {
                    background-image: repeating-linear-gradient( -45deg, #81C784 0 60px, /* medium green */
                    #388E3C 60px 120px /* deep green */
                    );
                    animation-direction: reverse;
                    animation-duration: 10s;
                    opacity: .7;
                }

                /* layer 3 – pale lime ↔ rich teal, slowest */
                .abc-mud-wasm:nth-of-type(3) {
                    background-image: repeating-linear-gradient( -45deg, #E8F5E9 0 60px, /* pale lime */
                    #43A047 60px 120px /* teal-green */
                    );
                    animation-duration: 12s;
                    opacity: .5;
                }

            /* centred content (logo / “loading” message) */
            .abc-mud-wasm-cont {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 10vmin;
                text-align: center;
                z-index: 1; /* above stripes */
            }

            /* brighter, easier-to-read loading message */
            .abc-loader-message {
                margin-top: 2rem;
                font: 600 1.6rem/1.35 "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                /* pure white text */
                color: #ffffff;
                /* soft outline so white text doesn’t vanish on pale stripes */
                text-shadow: 0 0 6px rgba(0, 0, 0, 0.55), /* outer glow */
                0 0 2px rgba(0, 0, 0, 0.40); /* inner edge */

                letter-spacing: .02em;
            }

            #abc-blazor-error-ui {
                display: none;
            }
        </style>



        <div style="height:100%;width:100%;margin:0;position:fixed;">
            <!-- three moving stripe layers -->
            <div class="abc-mud-wasm"></div>
            <div class="abc-mud-wasm" style="animation-direction:alternate-reverse;animation-duration:4s;"></div>
            <div class="abc-mud-wasm" style="animation-duration:5s;"></div>

            <!-- centred content -->
            <div class="abc-mud-wasm-cont">
                <!-- your SVG logo (optional) -->
                <svg width="300" height="270" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg">
                    <!-- sample placeholder path -->
                    <circle cx="300" cy="350" r="320" fill="#ffffff55" stroke="#FF8C00" stroke-width="10" />
                    <text x="300" y="380" text-anchor="middle"
                          font-family="Arial black, sans-serif"
                          font-size="140" fill="#E35A00">TRAJAN</text>
                    <!-- font-size="180" fill="#fff">TRAJAN</text> -->
                    <!-- stroke="#FF8C00" stroke-width="10">TRAJAN</text> -->
                </svg>

                <!-- loading message -->
                <p class="abc-loader-message">
                    Patientez&nbsp;Chargement&nbsp;En&nbsp;Cours&nbsp;......&hellip;
                </p>
            </div>
        </div>

    </div>

    <div id="abc-blazor-error-ui" style="display:none">
        Une erreur innattendue est survenue.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!-- Ergonomie clavier du formulaire Création élève (façon Access) :
         - Entrée / Tab : passer au champ suivant
         - Ctrl+S ou F2 : exécuter Saisir/Modifier (enregistrer)
         - F8 : exécuter Nouveau (vider)
         Enregistré/désenregistré par le composant CreateEleve (interop .NET). -->
    <script>
        window.trajanCreateEleve = {
            _onKey: null,
            register: function (dotNetRef) {
                if (this._onKey) { document.removeEventListener('keydown', this._onKey, true); }
                this._onKey = function (e) {
                    // Raccourcis d'action (actifs sur toute la page Création élève)
                    if ((e.ctrlKey && (e.key === 's' || e.key === 'S')) || e.key === 'F2') {
                        e.preventDefault();
                        // Garde : si la ref .NET a ete disposee, on ignore au lieu de crasher.
                        try { dotNetRef.invokeMethodAsync('SaveFromShortcut').catch(function () { }); } catch (err) { }
                        return;
                    }
                    if (e.key === 'F8') {
                        e.preventDefault();
                        try { dotNetRef.invokeMethodAsync('NewFromShortcut').catch(function () { }); } catch (err) { }
                        return;
                    }
                    // Entrée : passer au champ suivant (comme Tab), dans le formulaire
                    if (e.key === 'Enter') {
                        var el = e.target;
                        if (!el || !el.closest) { return; }
                        var form = el.closest('.acc-window');
                        if (!form) { return; }
                        var tag = el.tagName;
                        if (tag === 'TEXTAREA' || tag === 'BUTTON') { return; }
                        e.preventDefault();
                        var fields = Array.prototype.slice
                            .call(form.querySelectorAll('input, select, textarea'))
                            .filter(function (n) { return !n.disabled && n.tabIndex !== -1 && n.offsetParent !== null; });
                        var i = fields.indexOf(el);
                        if (i > -1 && i < fields.length - 1) { fields[i + 1].focus(); }
                    }
                };
                document.addEventListener('keydown', this._onKey, true);
            },
            unregister: function () {
                if (this._onKey) { document.removeEventListener('keydown', this._onKey, true); this._onKey = null; }
            }
        };

        // Masque de saisie des dates (champs marques .acc-datemask) : les « / » se placent
        // tout seuls — taper 15112015 affiche 15/11/2015. Le 2e event 'input' dispatche
        // apres reecriture informe Blazor/MudBlazor de la nouvelle valeur (pas de boucle :
        // au 2e passage la valeur masquee est identique, on ressort sans rien faire).
        document.addEventListener('input', function (e) {
            var el = e.target;
            if (!el || el.tagName !== 'INPUT' || !el.closest || !el.closest('.acc-datemask')) { return; }
            var digits = el.value.replace(/\D/g, '').slice(0, 8);
            var out = digits.length > 4 ? digits.slice(0, 2) + '/' + digits.slice(2, 4) + '/' + digits.slice(4)
                    : digits.length > 2 ? digits.slice(0, 2) + '/' + digits.slice(2)
                    : digits;
            if (out !== el.value) {
                el.value = out;
                el.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }, true);

        // Navigation clavier de la zone de saisie d'un versement (form Access « Scolarités ») :
        // Tab OU Entrée enchaîne Montant -> Date -> Nature -> Mode -> Réf. opération -> Valider,
        // dans CET ordre (indépendant de l'ordre du DOM). Sur Valider : Entrée = clic, Tab = stop.
        // Shift+Tab remonte. Toujours branché mais borné à .svt-saisie (no-op ailleurs) ; en
        // veille tant qu'une liste déroulante / un calendrier MudBlazor est ouvert (choix natif).
        (function () {
            // Conteneurs des étapes, dans l'ordre voulu (indépendant du DOM).
            var ETAPES = ['.svt-montant', '.acc-datemask', '.svt-nav-nature',
                          '.svt-nav-mode', '.svt-nav-ref', '.svt-btn-valider'];

            // Élément réellement focusable d'une étape : le <input> visible pour les champs
            // texte/nombre/date ; le <div tabindex="0"> pour un MudSelect (son <input> est
            // type=hidden, non focusable) ; le conteneur lui-même pour le bouton Valider.
            function cibleFocus(zone, sel) {
                var c = zone.querySelector(sel);
                if (!c) { return null; }
                return c.querySelector('input:not([type=hidden]):not([disabled])')
                    || c.querySelector('[tabindex]:not([tabindex="-1"])')
                    || (c.matches('button, [tabindex]') ? c : null)
                    || c;
            }

            document.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter' && e.key !== 'Tab') { return; }
                var el = e.target;
                if (!el || !el.closest) { return; }
                var zone = el.closest('.svt-saisie');
                if (!zone) { return; }
                // Liste déroulante / calendrier réellement ouvert : on laisse le clavier
                // natif faire le choix. (On ne bloque PAS sur un simple tooltip ouvert, qui
                // est aussi un popover mais ne contient ni liste ni calendrier.)
                if (document.querySelector('.mud-popover-open .mud-list, .mud-popover-open .mud-picker')) { return; }

                var i = ETAPES.findIndex(function (s) { return el.closest(s); });
                if (i === -1) { return; } // focus sur Nouveau / Reçu : comportement par défaut

                // On prend la main : couper aussi la propagation, sinon MudSelect ouvrirait
                // sa liste (ou le DatePicker son calendrier) sur le même Entrée.
                var prendreLaMain = function () {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                };

                if (e.shiftKey) {
                    if (e.key === 'Tab' && i > 0) {
                        prendreLaMain();
                        var prec = cibleFocus(zone, ETAPES[i - 1]);
                        if (prec) { prec.focus(); }
                    }
                    return;
                }

                prendreLaMain();
                if (i < ETAPES.length - 1) {
                    var suiv = cibleFocus(zone, ETAPES[i + 1]);
                    if (suiv) { suiv.focus(); }
                } else if (e.key === 'Enter') {
                    // Dernier champ = Valider : Entrée déclenche le clic (Tab ne fait rien).
                    var btn = zone.querySelector('.svt-btn-valider');
                    if (btn) { btn.click(); }
                }
            }, true);
        })();

        // Convertit une image (URL/chemin servi par le front) en data-URI base64,
        // pour l'embarquer dans un PDF généré côté serveur (ex. logo école du reçu).
        // Renvoie null si l'image est absente ou illisible (le reçu se génère sans logo).
        window.trajanImageEnBase64 = async function (url) {
            try {
                if (!url) { return null; }
                const resp = await fetch(url);
                if (!resp.ok) { return null; }
                const blob = await resp.blob();
                return await new Promise(function (resolve) {
                    const reader = new FileReader();
                    reader.onloadend = function () { resolve(reader.result); };
                    reader.onerror = function () { resolve(null); };
                    reader.readAsDataURL(blob);
                });
            } catch (e) { return null; }
        };

        // Téléchargement d'un fichier produit par une API (reçu PDF, rapports...) :
        // Blazor WASM passe les octets en base64, on déclenche le download navigateur.
        window.trajanTelechargerFichier = function (nomFichier, base64, typeMime) {
            var octets = Uint8Array.from(atob(base64), function (c) { return c.charCodeAt(0); });
            var url = URL.createObjectURL(new Blob([octets], { type: typeMime || 'application/octet-stream' }));
            var a = document.createElement('a');
            a.href = url;
            a.download = nomFichier;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // Ouvre le fichier dans un ONGLET (lecteur PDF du navigateur) au lieu de le
        // télécharger : affichage immédiat, et les gestionnaires de téléchargement
        // (IDM...) ne s'en mêlent pas. Si le navigateur bloque le popup, on retombe
        // sur le téléchargement classique. L'URL blob est révoquée après 60 s (le
        // temps que l'onglet charge le document).
        window.trajanOuvrirFichier = function (nomFichier, base64, typeMime) {
            var octets = Uint8Array.from(atob(base64), function (c) { return c.charCodeAt(0); });
            var url = URL.createObjectURL(new Blob([octets], { type: typeMime || 'application/octet-stream' }));
            var fenetre = window.open(url, '_blank');
            if (!fenetre) {
                // Popup bloqué : repli téléchargement (et on révoque tout de suite).
                var a = document.createElement('a');
                a.href = url;
                a.download = nomFichier;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                return;
            }
            setTimeout(function () { URL.revokeObjectURL(url); }, 60000);
        };

        // Grille élèves (/scolarites) pilotée comme un tableur :
        //  - Flèche Haut / Bas : déplace le focus vers la cellule de MÊME colonne dans la
        //    ligne adjacente (data-col identique). En veille si une déroulante est ouverte
        //    (les flèches servent alors à choisir dans la liste).
        //  - Ctrl+' (apostrophe = touche 4 de l'AZERTY) : recopie dans la cellule courante
        //    la valeur de la cellule juste au-dessus, via un rappel .NET — indispensable pour
        //    les colonnes déroulantes (Statut/Niveau/Classe) que le DOM seul ne mettrait pas à jour.
        window.svtGrilleEleves = {
            _ref: null,
            init: function (dotNetRef) { this._ref = dotNetRef; }
        };

        (function () {
            // Cellule de même colonne dans une ligne <tr> voisine.
            function celluleColonne(tr, col) {
                return tr ? tr.querySelector('td[data-col="' + col + '"]') : null;
            }
            // Élément focusable d'une cellule : input visible, sinon le div[tabindex] du MudSelect.
            function focusable(td) {
                if (!td) { return null; }
                return td.querySelector('input:not([type=hidden]):not([disabled])')
                    || td.querySelector('[tabindex]:not([tabindex="-1"])');
            }

            document.addEventListener('keydown', function (e) {
                var el = e.target;
                if (!el || !el.closest) { return; }
                var td = el.closest('td[data-col]');
                if (!td || !td.closest('.acc-grid-eleves')) { return; }

                var col = td.getAttribute('data-col');
                var tr = td.closest('tr');

                // Navigation Haut / Bas entre lignes.
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    // Déroulante réellement ouverte : on laisse les flèches naviguer la liste.
                    if (document.querySelector('.mud-popover-open .mud-list')) { return; }
                    var voisin = e.key === 'ArrowUp' ? tr.previousElementSibling : tr.nextElementSibling;
                    var cible = focusable(celluleColonne(voisin, col));
                    if (cible) {
                        e.preventDefault();
                        e.stopPropagation(); // sinon MudSelect ouvrirait sa liste sur la même flèche
                        cible.focus();
                    }
                    return;
                }

                // Ctrl+' : copier la valeur de la cellule du dessus (touche « ' » / 4 AZERTY).
                if (e.ctrlKey && (e.key === "'" || e.code === 'Digit4')) {
                    var tdHaut = celluleColonne(tr.previousElementSibling, col);
                    if (!tdHaut) { return; } // première ligne (ou ligne du dessus non rendue) : rien à copier
                    e.preventDefault();
                    e.stopPropagation();
                    var sourceId = tdHaut.getAttribute('data-eleve-id');
                    var cibleId = td.getAttribute('data-eleve-id');
                    if (window.svtGrilleEleves._ref && sourceId && cibleId) {
                        try {
                            window.svtGrilleEleves._ref
                                .invokeMethodAsync('CopierCelluleDuHaut', sourceId, cibleId, col)
                                .catch(function () { });
                        } catch (err) { }
                    }
                }
            }, true);
        })();

        // ==== Gel des colonnes de la grille « Liste de classe » ====
        // Mesure la largeur des 7 premières colonnes (ligne d'en-tête) et publie les offsets
        // CUMULÉS en variables CSS --lc-fz-1..7 sur chaque wrapper .acc-grid-eleves. Le CSS
        // scopé applique `left: var(--lc-fz-n)` aux cellules figées (position:sticky). Ainsi
        // le gel reste exact même quand les colonnes s'adaptent au contenu (largeur auto).
        // Rappelé au rendu Blazor (lcFreeze.apply) et au redimensionnement de la fenêtre.
        window.lcFreeze = {
            apply: function () {
                document.querySelectorAll('.acc-grid-eleves').forEach(function (wrap) {
                    var row = wrap.querySelector('thead tr');
                    if (!row) { return; }
                    var cells = row.children, left = 0;
                    for (var i = 0; i < 7 && i < cells.length; i++) {
                        wrap.style.setProperty('--lc-fz-' + (i + 1), left + 'px');
                        left += cells[i].getBoundingClientRect().width;
                    }
                });
            }
        };
        window.addEventListener('resize', function () {
            if (window.lcFreeze) { window.lcFreeze.apply(); }
        });

        // Impression de la Fiche Élève seule : on masque le reste via la classe body
        // « lc-print-fiche » (règles @media print dans le <style>), on imprime, on rétablit.
        window.lcImprimerFiche = function () {
            document.body.classList.add('lc-print-fiche');
            window.print();
            document.body.classList.remove('lc-print-fiche');
        };

        // Impression de la Liste de classe : même principe, on isole la feuille d'aperçu A4
        // (classe body « lc-print-liste ») le temps de l'impression. `paysage` bascule la page
        // en A4 paysage (modèles larges : appel, trombinoscope) via une règle @page injectée.
        window.lcImprimerListe = function (paysage) {
            document.body.classList.add('lc-print-liste');
            var orient = null;
            if (paysage) {
                orient = document.createElement('style');
                orient.id = 'lc-print-orient';
                orient.textContent = '@page { size: A4 landscape; margin: 8mm; }';
                document.head.appendChild(orient);
            }
            window.print();
            if (orient) { orient.remove(); }
            document.body.classList.remove('lc-print-liste');
        };

        // Impression du Reçu de paiement : isole « .recu-feuille » le temps du print.
        window.svtImprimerRecu = function () {
            document.body.classList.add('svt-print-recu');
            window.print();
            document.body.classList.remove('svt-print-recu');
        };
    </script>
</body>
